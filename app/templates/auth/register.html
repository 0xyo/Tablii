{% extends "base.html" %}

{% block title %}Register — Tablii{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="card w-full max-w-md">
    <!-- Title -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-orange-500">🍽️ Tablii</h1>
      <p class="text-gray-500 mt-1">Create your restaurant</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register_post') }}" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div>
        <label for="reg-name" class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
        <input
          id="reg-name"
          name="name"
          type="text"
          required
          class="input-field"
          placeholder="Ahmed Ben Ali"
          value="{{ request.form.get('name', '') }}"
        />
      </div>

      <div>
        <label for="reg-email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          id="reg-email"
          name="email"
          type="email"
          required
          class="input-field"
          placeholder="you@example.com"
          value="{{ request.form.get('email', '') }}"
        />
      </div>

      <div>
        <label for="reg-phone" class="block text-sm font-medium text-gray-700 mb-1">Phone <span class="text-gray-400">(optional)</span></label>
        <input
          id="reg-phone"
          name="phone"
          type="tel"
          class="input-field"
          placeholder="+216 12 345 678"
          value="{{ request.form.get('phone', '') }}"
        />
      </div>

      <div>
        <label for="reg-restaurant" class="block text-sm font-medium text-gray-700 mb-1">Restaurant Name</label>
        <input
          id="reg-restaurant"
          name="restaurant_name"
          type="text"
          required
          class="input-field"
          placeholder="Café de Tunis"
          value="{{ request.form.get('restaurant_name', '') }}"
        />
      </div>

      <div>
        <label for="reg-password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input
          id="reg-password"
          name="password"
          type="password"
          required
          minlength="8"
          class="input-field"
          placeholder="At least 8 characters"
        />
      </div>

      <div>
        <label for="reg-confirm" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input
          id="reg-confirm"
          name="confirm_password"
          type="password"
          required
          class="input-field"
          placeholder="Repeat your password"
        />
      </div>

      <button type="submit" class="btn-primary w-full">Create Account</button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" class="text-orange-500 hover:text-orange-600 font-medium">Login here</a>
    </p>
  </div>
</div>
{% endblock %}
